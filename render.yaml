services:
  - type: web
    name: bootybaba-bot
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get install -y ffmpeg || true
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SIGHTENGINE_USER
        sync: false
      - key: SIGHTENGINE_SECRET
        sync: false
